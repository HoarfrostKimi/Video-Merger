<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; }
    h3 { font-size: 15px; margin-bottom: 12px; color: #333; }
    .desc { color: #888; font-size: 12px; margin-bottom: 12px; line-height: 1.5; }
    .btn { display: block; width: 100%; padding: 8px 0; background: #00a1d6; color: #fff; border: none; border-radius: 4px; font-size: 13px; cursor: pointer; margin-top: 8px; }
    .btn:hover { background: #00b5e5; }
    .btn.secondary { background: #f4f4f4; color: #333; }
    .btn.secondary:hover { background: #e8e8e8; }
    .status { margin-top: 10px; padding: 8px; background: #f9f9f9; border-radius: 4px; font-size: 12px; color: #666; line-height: 1.5; }
    .tip { margin-top: 8px; font-size: 11px; color: #aaa; }
  </style>
</head>
<body>
  <h3>B站投稿助手</h3>
  <p class="desc">
    打开 <a href="https://member.bilibili.com/platform/upload/video/frame" target="_blank">B站投稿页面</a>，<br>
    页面右侧会出现助手面板，可自动上传本地视频并提交稿件。
  </p>
  <button class="btn" id="openPage">打开B站投稿页面</button>
  <div class="status" id="status">就绪</div>
  <p class="tip">提示：需要先在B站登录账号</p>
  <script src="popup.js"></script>
</body>
</html>
